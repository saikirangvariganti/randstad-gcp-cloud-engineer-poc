apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: randstad-gcp-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "randstad-gcp-ip"
    networking.gke.io/managed-certificates: "randstad-gcp-cert"
    networking.gke.io/v1beta1.FrontendConfig: "randstad-frontend-config"
    kubernetes.io/ingress.allow-http: "false"
spec:
  rules:
    - host: app.randstad-gcp-poc.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: randstad-gcp-app
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: randstad-gcp-app
                port:
                  number: 80
