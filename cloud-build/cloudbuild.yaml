steps:
  # Step 1: Run Checkov security scan on Terraform
  - name: "bridgecrew/checkov:latest"
    id: checkov-terraform
    args:
      - "-d"
      - "terraform/"
      - "--framework"
      - "terraform"
      - "--output"
      - "cli"
      - "--soft-fail"
    waitFor: ["-"]

  # Step 2: Run Checkov security scan on Kubernetes manifests
  - name: "bridgecrew/checkov:latest"
    id: checkov-k8s
    args:
      - "-d"
      - "k8s/"
      - "--framework"
      - "kubernetes"
      - "--output"
      - "cli"
      - "--soft-fail"
    waitFor: ["-"]

  # Step 3: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest"
      - "app/"
    waitFor: ["checkov-terraform", "checkov-k8s"]

  # Step 4: Run Trivy vulnerability scan
  - name: "aquasec/trivy:latest"
    id: trivy-scan
    args:
      - "image"
      - "--exit-code"
      - "0"
      - "--severity"
      - "CRITICAL,HIGH"
      - "--format"
      - "table"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA"
    waitFor: ["build"]

  # Step 5: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: push-sha
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA"
    waitFor: ["trivy-scan"]

  - name: "gcr.io/cloud-builders/docker"
    id: push-latest
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest"
    waitFor: ["push-sha"]

  # Step 6: Deploy via ArgoCD sync
  - name: "argoproj/argocd:latest"
    id: argocd-sync
    entrypoint: "argocd"
    args:
      - "app"
      - "sync"
      - "randstad-gcp-app"
      - "--server"
      - "${_ARGOCD_SERVER}"
      - "--auth-token"
      - "$$ARGOCD_TOKEN"
      - "--grpc-web"
    secretEnv: ["ARGOCD_TOKEN"]
    waitFor: ["push-latest"]

substitutions:
  _REGION: europe-west2
  _REPO: randstad-repo
  _IMAGE: randstad-gcp-app
  _ARGOCD_SERVER: argocd.example.com

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/argocd-token/versions/latest
      env: ARGOCD_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
  substitution_option: "ALLOW_LOOSE"

timeout: "1200s"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest"
